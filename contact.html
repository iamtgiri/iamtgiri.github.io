    <link rel="stylesheet" href="contact.css">

</head>

<body>
  <div class="container">
    <div class="sidebar sidebargo">
        <nav>
            <ul>
                <li><a href="/"> Home </a></li>
                <li><a href="/intro.html"> My Intro </a></li>

                <li><a href="/blog.html"> Blog </a></li>
            </ul>
        </nav>
    </div>
    <div class="main">
        <div class="hamburg">
            <img class="ham" src="ham.png" alt="" width="23px">
            <img class="cross" src="cross.png" alt="" width="23px">
        </div>
            <div class="contactForm">

                <form>
                    <h1>Contact Me</h1>
                    <div class="mb-3">
                      <label for="clientemail" class="form-label">Your name</label>
                      <input type="name" class="form-control" id="clientname" aria-describedby="nameHelp" placeholder="Enter your name">
                    </div>
                    <div class="mb-3">
                      <label for="clientemail" class="form-label">Email address</label>
                      <input type="email" class="form-control" id="clientemail" aria-describedby="emailHelp" placeholder="Enter your email address">
                    </div>
                    <div class="mb-3">
                      <label for="clientphone" class="form-label">Mobile No.</label>
                      <input type="phone" class="form-control" id="clientphone" placeholder="Enter your mobile number">
                      <div id="emailHelp" class="form-text">We'll never share your email & Mobile No. with anyone.</div>
                    </div>
                    <div class="mb-3">
                      <label for="clientemail" class="form-label">Your Message</label>
                      <input type="text" class="form-control" id="clientname" aria-describedby="nameHelp" placeholder="Enter your message...">
                    </div>
                    <div class="mb-3" id="form-check">
                      <input type="checkbox" class="form-check-input" id="isclient">
                      <label class="form-check-label" for="isclient">You want you to work on a project with me.</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                  </form>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
